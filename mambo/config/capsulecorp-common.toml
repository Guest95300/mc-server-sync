[capsules]
	#Maximum number of blocks a Copper Capsule can store.
	# Default: 512
	# Range: 1 ~ 8192
	copperCapacity = 512
	#Maximum number of blocks an Iron Capsule can store.
	# Default: 1024
	# Range: 1 ~ 8192
	ironCapacity = 1024
	#Maximum number of blocks a Gold Capsule can store.
	# Default: 2048
	# Range: 1 ~ 8192
	goldCapacity = 2048
	#Maximum number of blocks a Diamond Capsule can store.
	# Default: 4096
	# Range: 1 ~ 8192
	diamondCapacity = 4096
	#Maximum number of blocks a Netherite Capsule can store.
	# Default: 8192
	# Range: 1 ~ 8192
	netheriteCapacity = 8192

[wallet]
	#Maximum number of capsules a Capsule Wallet can store.
	# Default: 6
	# Range: 1 ~ 27
	capsuleWalletSlots = 6

[deployment]
	#Initial velocity of a thrown capsule.
	# Default: 1.0
	# Range: 0.1 ~ 5.0
	capsuleThrowVelocity = 1.2
	#Ticks before a thrown capsule deploys automatically while flying.
	# Default: 15
	# Range: 1 ~ 200
	deployDelayTicks = 15
	#Ticks during which newly deployed Sable sub-levels are stabilized.
	# Default: 20
	# Range: 0 ~ 200
	postDeployStabilizationTicks = 30
	#Maximum radius, in blocks, used to find a nearby valid deployment position
	#when the initial position is blocked.
	# Default: 3
	# Range: 0 ~ 12
	deploySearchRadius = 3
