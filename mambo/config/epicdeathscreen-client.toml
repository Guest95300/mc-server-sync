[death_cinematic]
	#Full scene duration in seconds before auto respawn, or before manual respawn prompt appears.
	# Default: 7.0
	# Range: 2.0 ~ 20.0
	scene_duration_seconds = 4.97887323943662
	#Heartbeat layer volume multiplier.
	# Default: 1.0
	# Range: 0.0 ~ 2.0
	heartbeat_volume = 1.0
	#Breathing layer volume multiplier.
	# Default: 1.0
	# Range: 0.0 ~ 2.0
	breathing_volume = 0.5
	#Global strength of scanlines, noise and tracking artifacts.
	# Default: 1.0
	# Range: 0.0 ~ 2.0
	vhs_intensity = 1.0
	#Strength of RGB split on the message text.
	# Default: 0.35
	# Range: 0.0 ~ 1.5
	chromatic_aberration = 0.3499999940395355
	#Automatically respawn after the scene finishes.
	auto_respawn = false
